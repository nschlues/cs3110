<!DOCTYPE html>
<html lang='en'>
<head>
        <meta charset='UTF-8'>
        <title>Shopping list</title>
        <script src="client.js" defer></script>
        <link rel="stylesheet" href="style.css">

</head>

<body>
        <header>
                <div class="left">
                        <h1 class="label">Shopping List</h1>
                </div>

                <button id="logout-button" onclick="logout()">Logout</button>
        </header>
        

        <section class="card">
                <div class="header">
                        <h2 class="label">Current Items</h2>
                </div>
                        <ul id="item-list">
                                <li class="empty">No items in the list</li>
                        </ul>   

        </section>
        
        
        <section class="card">
                <div class="header">
                        <h3 class="label">Get all items</h3>
                </div>
                <a href="/api">GET all items</a>
        </section>


        <section class="card">
                <div class="header">
                        <h2 class="label">GET an item by index</h2>
                </div>
                        <form action='/api' method="GET">
                                <label for="item">Index:</label>
                                <input type="number" id="index" name="index" min="0">
                                <button type="submit">Get Item</button>
                        </form>
        </section>


        <section class="card">
                <div class="header">
                        <h2 class="label">POST an item (add to list)</h2>
                </div>
                        <form action='/api' method='POST' id="post-event">
                                <label for="item">New Item Name:</label>
                                <input type="text" id="item" name="item">
                                <button type="submit">Add Item</button>
                        </form>
        </section>

        <section class="card">
                <div class="header">
                        <h2 class="label">PUT an item (update an item)</h2>
                </div>
                        <form action="/api" method="POST" id="put-event">
                                <input type="hidden" name="_method" value="PUT">
                                <label for="put-index">Index:</label>
                                <input type="number" id="put-index" name="index" min="0">
                                <label for="put-item">New Value:</label>
                                <input type="text" id="put-item" name="item">
                                <button type="submit">Update Item</button>
                        </form>
        </section>


        <section class="card">
                <div class="header">
                        <h2 class="label">DELETE an item (remove from list)</h2>
                </div>
                        <form action="/api" method="POST" id="delete-event">
                                <input type="hidden" name="_method" value="DELETE">
                                <label for="delete-index">Index:</label>
                                <input type="number" id="delete-index" name="index" min="0">
                                <button type="submit">Delete Item</button>
                        </form>
        </section>


        <section class="card">
                <div class="header">
                        <h2 class="label">Admin: Create New User</h2>
                </div>
                <form id="create-user-event">
                        <label>Username: <input type="text" name="username"></label>
                        <label>Password: <input type="password" name="password"></label>
                        <label>Role:
                                <select name="role">
                                        <option value="author">Author</option>
                                        <option value="admin">Admin</option>
                                </select>
                        </label>
                        <button type="submit">Create User</button>
                </form>

        </section>
</body>
</html>
